<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@xbartega Social Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0A1929;
            --card-bg: #112235;
            --border: #1A3A52;
            --text: #E8F4F8;
            --text-muted: #64B5C6;
            --accent: #00F0FF;
            --green: #00FF88;
            --red: #FF6B6B;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 1rem;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header {
            text-align: center;
            padding: 1.5rem 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }
        h1 { 
            font-size: 1.8rem; 
            background: linear-gradient(135deg, #00F0FF, #a855f7); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            text-align: center;
        }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }
        
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }
        
        .posts-section { margin-bottom: 1.5rem; }
        .section-title { font-size: 1rem; margin-bottom: 1rem; color: var(--text-muted); }
        
        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .post-text { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .post-stats { display: flex; gap: 1rem; font-size: 0.75rem; color: var(--text-muted); }
        .post-stats span { color: var(--accent); }
        
        .tips-section {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 1rem;
        }
        .tip { 
            padding: 0.5rem 0; 
            border-bottom: 1px solid var(--border); 
            font-size: 0.85rem;
        }
        .tip:last-child { border-bottom: none; }
        .tip::before { content: "💡 "; }
        
        .trend-up { color: var(--green); }
        .trend-down { color: var(--red); }
        
        footer {
            text-align: center;
            padding: 1rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>@xbartega Social Dashboard</h1>
            <p class="subtitle">DeFi • Kamino • RWA</p>
            <p class="subtitle" id="lastUpdated">Last updated: --</p>
        </header>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="avgLikes">--</div>
                <div class="stat-label">Avg Likes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgRetweets">--</div>
                <div class="stat-label">Avg Retweets</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgReplies">--</div>
                <div class="stat-label">Avg Replies</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgViews">--</div>
                <div class="stat-label">Avg Views</div>
            </div>
        </div>
        
        <div class="content-grid">
            <div class="posts-section">
                <h2 class="section-title">Recent Posts</h2>
                <div id="postsList"></div>
            </div>
            
            <div class="tips-section">
                <h2 class="section-title">💡 Tips</h2>
                <div id="tipsList"></div>
            </div>
        </div>
        
        <footer>
            Social Dashboard • Updated daily at 9 AM
        </footer>
    </div>
    
    <script>
        // Load data from JSON
        async function loadData() {
            try {
                const response = await fetch('social-tracker-data.json');
                const data = await response.json();
                
                document.getElementById('lastUpdated').textContent = 'Last updated: ' + data.lastUpdated;
                document.getElementById('avgLikes').textContent = data.avgLikes;
                document.getElementById('avgRetweets').textContent = data.avgRetweets;
                document.getElementById('avgReplies').textContent = data.avgReplies;
                document.getElementById('avgViews').textContent = data.avgViews;
                
                // Posts
                const postsHtml = data.posts.map(post => `
                    <div class="post-card">
                        <div class="post-header">
                            <span style="font-size:0.8rem;color:var(--text-muted)">${post.time}</span>
                            ${post.pinned ? '<span style="background:rgba(0,240,255,0.2);color:#00F0FF;padding:2px 6px;font-size:0.6rem">Pinned</span>' : ''}
                        </div>
                        <div class="post-text">${post.text}</div>
                        <div class="post-stats">
                            <span>❤️ ${post.likes}</span>
                            <span>🔁 ${post.retweets}</span>
                            <span>💬 ${post.replies}</span>
                            <span>👁️ ${post.views}</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('postsList').innerHTML = postsHtml;
                
                // Tips
                const tipsHtml = data.tips.map(tip => `<div class="tip">${tip}</div>`).join('');
                document.getElementById('tipsList').innerHTML = tipsHtml;
                
            } catch(e) {
                console.log('Waiting for data...');
            }
        }
        
        loadData();
    </script>
</body>
</html>
